name: LookMaNoHands
options:
  bundleIdPrefix: dev.lookmanohands
  deploymentTarget:
    macOS: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    revision: c71c5ed607c3853c041b8fd3c1042e6e5b5a29a3
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    from: "2.0.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.13.6"

targets:
  LookMaNoHands:
    type: application
    platform: macOS
    sources:
      - path: LookMaNoHands
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
          - "Resources/Models/**"
          - "Resources/Models"
      - path: LookMaNoHands/Resources/Models
        type: folder
        optional: true
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: LookMaNoHands/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: LookMaNoHands/Resources/LookMaNoHands.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: dev.lookmanohands.app
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: FluidAudio
        product: FluidAudio
      - package: KeyboardShortcuts
