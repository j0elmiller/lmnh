<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" width="18" height="18">
  <!-- Mic capsule -->
  <rect x="2" y="1.5" width="3" height="6" rx="1.5" fill="#000"/>
  <!-- Mic cradle -->
  <path d="M0.5 6 Q0.5 9.5 3.5 9.5 Q6.5 9.5 6.5 6" stroke="#000" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Mic stand post -->
  <line x1="3.5" y1="9.5" x2="3.5" y2="12" stroke="#000" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Mic base -->
  <line x1="1.5" y1="12.5" x2="5.5" y2="12.5" stroke="#000" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Speaker body -->
  <rect x="9.5" y="6" width="1.5" height="4" fill="#000"/>
  <!-- Speaker cone -->
  <path d="M11 6 L13.5 3.5 L13.5 12.5 L11 10 Z" fill="#000"/>
  <!-- Sound wave -->
  <path d="M14.5 6.5 Q15.7 8 14.5 9.5" stroke="#000" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- Ellipsis / progress dots -->
  <circle cx="6" cy="15.5" r="0.9" fill="#000"/>
  <circle cx="9" cy="15.5" r="0.9" fill="#000"/>
  <circle cx="12" cy="15.5" r="0.9" fill="#000"/>
</svg>
