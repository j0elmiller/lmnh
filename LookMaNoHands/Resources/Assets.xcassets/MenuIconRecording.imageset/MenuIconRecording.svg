<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" width="18" height="18">
  <!-- Mic capsule (emphasized) -->
  <rect x="2" y="2" width="4" height="7" rx="2" fill="#000"/>
  <!-- Mic cradle -->
  <path d="M0.5 7 Q0.5 11 4 11 Q7.5 11 7.5 7" stroke="#000" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Mic stand post -->
  <line x1="4" y1="11" x2="4" y2="13.5" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Mic base -->
  <line x1="2" y1="14" x2="6" y2="14" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Speaker (outlined, reduced emphasis) -->
  <rect x="10" y="7" width="1.5" height="4" fill="none" stroke="#000" stroke-width="0.8"/>
  <path d="M11.5 7 L14 4.5 L14 13.5 L11.5 11 Z" fill="none" stroke="#000" stroke-width="0.8" stroke-linejoin="round"/>
</svg>
