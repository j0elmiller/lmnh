name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the problem you're trying to solve before proposing a specific solution — it makes it easier to evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What's frustrating, slow, or missing today? Who is affected?
      placeholder: |
        When I dictate into Slack, punctuation sometimes lands in the wrong place because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: How would you like this to work? UI mockups, example flows, or rough descriptions are all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about, and why you ruled them out.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Related projects, references, or context that might help.
